# Инвентарь прод-стенда. Заполнить ansible_host (адреса) под своё окружение.
# Группы: controllers (CP-ВМ) + workers (= ss_system + bench). k0sctl.yaml
# генерируется из этих групп (см. playbooks/templates/k0sctl.yaml.j2).
all:
  vars:
    ansible_user: ubuntu           # SSH-пользователь на узлах (sudo)
  children:

    controllers:                   # 3 CP-ВМ (4/8/100), k0s control-plane, HA-кворум etcd
      hosts:
        cp1: { ansible_host: "10.0.0.11" }   # <FILL>
        cp2: { ansible_host: "10.0.0.12" }   # <FILL>
        cp3: { ansible_host: "10.0.0.13" }   # <FILL>

    ss_system:                     # 1 ss-system-ВМ (4/8/100): Redis, scheduler, metrics-server, ClickHouse
      hosts:
        sssystem: { ansible_host: "10.0.0.21" }   # <FILL>

    bench:                         # 3× Dell R760 bare-metal (измерительные)
      hosts:
        bench1: { ansible_host: "10.0.0.31" }   # <FILL>
        bench2: { ansible_host: "10.0.0.32" }   # <FILL>
        bench3: { ansible_host: "10.0.0.33" }   # <FILL>

    workers:                       # всё, что несёт kubelet (ss_system + bench)
      children:
        ss_system: {}
        bench: {}
