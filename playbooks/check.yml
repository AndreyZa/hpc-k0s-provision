---
- name: Пост-проверки узлов
  hosts: all
  become: true
  gather_facts: false
  tasks:
    # Чтение procfs/sysfs — через slurp, а не `cat`: модуль и так read-only,
    # поэтому не нужны changed_when/check_mode-обвязки вокруг команды.
    - name: Прочитать perf_event_paranoid
      ansible.builtin.slurp:
        src: /proc/sys/kernel/perf_event_paranoid
      register: paranoid

    - name: Проверить PSI io.pressure
      ansible.builtin.stat:
        path: /sys/fs/cgroup/io.pressure
      register: psi

    - name: Прочитать активные swap-разделы
      ansible.builtin.slurp:
        src: /proc/swaps
      register: swaps

    # chrony модулем не читается — оставляем команду (она read-only).
    - name: Прочитать смещение времени (chrony)
      ansible.builtin.command: chronyc -n tracking
      register: chrony
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Прочитать текущий CPU governor (bench)
      ansible.builtin.slurp:
        src: /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor
      register: governor
      failed_when: false   # где cpufreq недоступен — не прерывать проверку
      when: inventory_hostname in groups['bench'] | default([])

    - name: Сводка по узлу
      ansible.builtin.debug:
        msg:
          - "paranoid = {{ node_paranoid }}"
          - "PSI = {{ psi.stat.exists }}"
          - "swap активен = {{ node_swap_on }}"
          - "chrony: {{ chrony.stdout_lines | select('search', 'System time') | first | default('нет chrony (?)') }}"
          - "governor: {{ node_governor }}"
      vars: &node_state
        node_paranoid: "{{ paranoid.content | b64decode | trim }}"
        # В /proc/swaps первая строка — заголовок, поэтому активный swap
        # это >1 непустой строки.
        node_swap_on: "{{ (swaps.content | b64decode).splitlines() | select('truthy') | list | length > 1 }}"
        node_governor: >-
          {{ (governor.content | b64decode | trim) if governor.content is defined else 'n/a (не bench)' }}
        node_is_bench: "{{ inventory_hostname in groups['bench'] | default([]) }}"

    # Раньше здесь заканчивалось: семь debug-блоков и «OK — стенд поднят».
    # Провалиться check не мог в принципе, хотя стенд с paranoid=3 (PMU
    # закрыт), governor=powersave на одном узле из трёх или мёртвым PSI даёт
    # не отказ, а ПРАВДОПОДОБНЫЕ данные — серия отработает часы и запишет
    # числа, по которым потом не понять, что мерили.
    #
    # Проблемы копятся в список и проверяются одним assert, а не набором
    # отдельных: assert падает на первом, и оператор чинил бы стенд по одной
    # находке за прогон, каждый раз заново обходя семь узлов.
    - name: Собрать нарушения по узлу
      ansible.builtin.set_fact:
        node_problems: >-
          {{
            ([] if node_paranoid | int <= perf_event_paranoid | int
             else ['perf_event_paranoid=' ~ node_paranoid ~ ' (нужно <= ' ~ perf_event_paranoid ~ ') — ' ~ pmu_msg])
            + ([] if psi.stat.exists else [psi_msg])
            + ([] if not (node_swap_on | bool) else [swap_msg])
            + ([] if chrony.rc == 0 else [chrony_msg])
            + ([] if not (node_is_bench | bool) or node_governor in ['performance', 'n/a (не bench)']
               else ['governor=' ~ node_governor ~ ' на измерительном узле — ' ~ gov_msg])
          }}
      vars:
        # Тексты отдельными переменными: в свёрнутом блоке YAML строка,
        # разбитая с отступом, сохраняет перенос — сообщения печатались рваными.
        pmu_msg: "агент не сможет читать PMU, оси LLC и NUMA останутся пустыми"
        psi_msg: "нет /sys/fs/cgroup/io.pressure: ось IO не измеряется (нужен cgroup v2 с PSI)"
        swap_msg: "активен swap: kubelet его не допускает, а подкачка посреди замера портит makespan"
        chrony_msg: "chronyc не отвечает: время узла не синхронизировано, makespan-таймстемпы несравнимы"
        gov_msg: "нужен performance, иначе частота плавает и makespan шумит"
        <<: *node_state

    - name: Узел пригоден для измерений
      ansible.builtin.assert:
        that: node_problems | length == 0
        fail_msg: |-
          {{ inventory_hostname }} к измерениям НЕ готов:
          {% for p in node_problems %}
            - {{ p }}
          {% endfor %}
        success_msg: "{{ inventory_hostname }}: пригоден для измерений"
        quiet: true

# Латентность fsync диска — узкое место etcd (нужен SSD, p99 < 10 мс).
# Проба пишет и удаляет временный файл, в --check пропускается.
- name: Проба диска под etcd (controllers)
  hosts: controllers
  become: true
  gather_facts: false
  tasks:
    - name: Записать 100×8КиБ с dsync (латентность fsync)
      ansible.builtin.command:
        cmd: dd if=/dev/zero of=/var/lib/.etcd-fsync-probe bs=8k count=100 oflag=dsync
      register: ddprobe
      changed_when: false

    - name: Убрать файл пробы
      ansible.builtin.file:
        path: /var/lib/.etcd-fsync-probe
        state: absent

    - name: Результат пробы (ориентир — десятки MB/s на SSD; ~1 MB/s недостаточно для etcd)
      ansible.builtin.debug:
        msg: "{{ ddprobe.stderr_lines | last | default('n/a (--check)') }}"

- name: Проверка кластера
  hosts: localhost
  connection: local
  gather_facts: false
  module_defaults:
    group/kubernetes.core.k8s:
      kubeconfig: "{{ playbook_dir }}/../kubeconfig"
  tasks:
    - name: Проверить наличие kubeconfig
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../kubeconfig"
      register: kc

    - name: Прочитать узлы кластера
      kubernetes.core.k8s_info:
        kind: Node
      register: nodes
      when: kc.stat.exists

    - name: Узлы
      ansible.builtin.debug:
        msg: >-
          {{ item.metadata.name }}
          roles={{ node_roles | join(',') | default('-', true) }}
          ready={{ (item.status.conditions | selectattr('type', 'equalto', 'Ready') | first).status }}
          {{ item.status.nodeInfo.kubeletVersion }}
      vars:
        node_role_prefix: '^node-role\.kubernetes\.io/'
        node_roles: >-
          {{ item.metadata.labels
             | select('match', node_role_prefix)
             | map('regex_replace', node_role_prefix, '')
             | list }}
      loop: "{{ nodes.resources | default([]) }}"
      loop_control:
        label: "{{ item.metadata.name }}"
      when: kc.stat.exists

    # Без StorageClass ПО УМОЛЧАНИЮ манифесты, просящие том без
    # storageClassName (ClickHouse), молча висят в Pending — отказ выглядит
    # как «под не стартует», а не как «нет хранилища». Проверяем явно.
    - name: Прочитать StorageClass'ы
      kubernetes.core.k8s_info:
        api_version: storage.k8s.io/v1
        kind: StorageClass
      register: storage_classes
      when: kc.stat.exists

    - name: StorageClass по умолчанию
      ansible.builtin.debug:
        msg: >-
          {{ 'default StorageClass = ' + (defaults | join(', '))
             if defaults | length > 0
             else 'НЕТ StorageClass по умолчанию — PVC без storageClassName (ClickHouse)
                   зависнут в Pending; выполнить make storage' }}
      vars:
        # Ключ аннотации содержит точки, поэтому путь
        # metadata.annotations.<key> Jinja разобрала бы как вложенность —
        # проверяем наличие ключа тестом contains по словарю annotations.
        defaults: >-
          {{ storage_classes.resources | default([])
             | map(attribute='metadata')
             | selectattr('annotations', 'defined')
             | selectattr('annotations', 'contains', 'storageclass.kubernetes.io/is-default-class')
             | map(attribute='name') | list }}
      when: kc.stat.exists

    # Проверка «есть класс по умолчанию» — косвенная: она не поймает том,
    # который не смог создаться. ClickHouse — единственный потребитель PVC на
    # стенде, поэтому его готовность и есть прямое доказательство, что
    # хранилище работает, а не только объявлено.
    - name: Прочитать StatefulSet ClickHouse
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: StatefulSet
        namespace: sensitivityscore-system
        name: clickhouse
      register: ch_sts
      when: kc.stat.exists

    - name: ClickHouse (приёмник результатов прода)
      ansible.builtin.debug:
        msg: >-
          {{ 'ClickHouse готов: ' + (ready | string) + '/' + (desired | string) + ' реплик'
             if ready | int > 0
             else ('ClickHouse НЕ готов (' + (ready | string) + '/' + (desired | string) + ') —
                    типичная причина: PVC в Pending, проверить StorageClass по умолчанию'
                   if ch_sts.resources | length > 0
                   else 'ClickHouse не развёрнут — make clickhouse') }}
      vars:
        ready: "{{ (ch_sts.resources[0].status.readyReplicas | default(0)) if ch_sts.resources | length > 0 else 0 }}"
        desired: "{{ (ch_sts.resources[0].spec.replicas | default(0)) if ch_sts.resources | length > 0 else 0 }}"
      when: kc.stat.exists

    - name: Прочитать Deployment'ы мониторинга
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        namespace: sensitivityscore-monitoring
      register: mon_deploys
      when: kc.stat.exists

    - name: Мониторинг
      ansible.builtin.debug:
        msg: >-
          {{ ('мониторинг: ' + (states | join(', ')))
             if mon_deploys.resources | default([]) | length > 0
             else 'мониторинг не развёрнут — make monitoring' }}
      vars:
        states: >-
          {{ mon_deploys.resources | default([])
             | map(attribute='metadata.name') | zip(
                 mon_deploys.resources | default([])
                 | map(attribute='status.readyReplicas') | map('default', 0))
             | map('join', '=') | list }}
      when: kc.stat.exists

    # Компоненты тестбеда: без них стенд выглядит поднятым, но серия либо не
    # пойдёт, либо пойдёт вхолостую. Мёртвый агент на одном узле из трёх —
    # самый скверный случай: планировщик считает узел «без метрик», ставит ему
    # нейтральный скор и продолжает работать, а серия молча меряет не то.
    - name: Прочитать DaemonSet агента метрик
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: DaemonSet
        namespace: sensitivityscore-system
        name: sensitivityscore-metrics-agent
      register: agent_ds
      when: kc.stat.exists

    - name: Прочитать Deployment планировщика
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        namespace: sensitivityscore-system
        name: sensitivityscore-scheduler
      register: sched_deploy
      when: kc.stat.exists

    - name: Собрать нарушения по кластеру
      ansible.builtin.set_fact:
        cluster_problems: >-
          {{
            ([] if not_ready | trim | length == 0 else ['узлы не Ready: ' ~ (not_ready | trim)])
            + ([] if default_sc | length > 0 else [sc_msg])
            + ([] if agent_ready | int > 0 and agent_ready | int == agent_desired | int
               else ['metrics-agent Ready ' ~ agent_ready ~ '/' ~ agent_desired ~ ' — ' ~ agent_msg])
            + ([] if sched_ready | int > 0 else [sched_msg])
          }}
      vars:
        # Тексты вынесены в переменные: внутри свёрнутого блока YAML строка,
        # разбитая на несколько строк с отступом, СОХРАНЯЕТ переносы — из-за
        # этого сообщения печатались рваными.
        sc_msg: "нет StorageClass по умолчанию: PVC ClickHouse зависнет в Pending — make storage"
        agent_msg: "узлы без агента планировщик сочтёт «без метрик» и даст нейтральный скор, серия померяет не то"
        sched_msg: "планировщик не Ready: плечо A-sensitivityscore выродится в default"
        # Готовность узла лежит внутри списка conditions, а selectattr по
        # вложенному условию Jinja не выражает — поэтому явный цикл.
        not_ready: >-
          {% set bad = [] %}
          {% for n in nodes.resources | default([]) %}
          {%   set ready = n.status.conditions | selectattr('type', 'equalto', 'Ready')
                           | map(attribute='status') | first | default('Unknown') %}
          {%   if ready != 'True' %}{{ bad.append(n.metadata.name) or '' }}{% endif %}
          {% endfor %}
          {{ bad | join(', ') }}
        default_sc: >-
          {{ storage_classes.resources | default([]) | map(attribute='metadata')
             | selectattr('annotations', 'defined')
             | selectattr('annotations', 'contains', 'storageclass.kubernetes.io/is-default-class')
             | list }}
        agent_ready: "{{ (agent_ds.resources[0].status.numberReady | default(0)) if agent_ds.resources | default([]) | length > 0 else 0 }}"
        agent_desired: "{{ (agent_ds.resources[0].status.desiredNumberScheduled | default(0)) if agent_ds.resources | default([]) | length > 0 else 0 }}"
        sched_ready: "{{ (sched_deploy.resources[0].status.readyReplicas | default(0)) if sched_deploy.resources | default([]) | length > 0 else 0 }}"
      when: kc.stat.exists

    - name: Кластер пригоден для серии
      ansible.builtin.assert:
        that: cluster_problems | length == 0
        fail_msg: |-
          Кластер к серии НЕ готов:
          {% for p in cluster_problems %}
            - {{ p }}
          {% endfor %}
        success_msg: "кластер пригоден для серии"
        quiet: true
      when: kc.stat.exists

    - name: Кластер ещё не поднят
      ansible.builtin.fail:
        msg: "kubeconfig не найден — сначала make cluster"
      when: not kc.stat.exists
