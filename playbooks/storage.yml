---
# Динамическое хранилище кластера: local-path-provisioner.
#
# Зачем: манифесты стенда просят тома без storageClassName (например
# ClickHouse, k8s/clickhouse/base/statefulset.yaml -> volumeClaimTemplates),
# а такой PVC связывается только при наличии StorageClass ПО УМОЛЧАНИЮ. Без
# него StatefulSet повиснет в Pending, и это единственное, чего не хватало
# прод-стенду из хранилища.
#
# Почему local-path, а не OpenEBS: чистота измерений. local-path — это ровно
# один Deployment и ни одного DaemonSet, его можно прибить к ss-system, и на
# измерительных узлах не появляется ничего. Бандл OpenEBS 4.x тянет Mayastor
# с DaemonSet'ами на все узлы, то есть постоянный посторонний процесс на
# bench — ровно то, от чего стенд бережёт LLC/IO (bench-репа,
# docs «Ввод прод-стенда (Этап 0)» §2). Встроенный в k0s
# `spec.extensions.storage.type: openebs_local_storage` вдобавок объявлен
# устаревшим в пользу helm-расширения.
#
# Оговорка: тома отдаёт узел, на котором встал ПОТРЕБИТЕЛЬ (SC работает в
# режиме WaitForFirstConsumer), а создаёт каталог короткоживущий helper-под
# на том же узле. Пока PVC просят только системные компоненты (они прибиты к
# ss-system), на bench не запускается ничего. Если PVC попросит под серии —
# helper на секунды появится на измерительном узле; для чистого прогона так
# не делать.
- name: Динамическое хранилище (local-path-provisioner)
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../inventory/group_vars/all.yml
  vars:
    local_path_url: >-
      https://raw.githubusercontent.com/rancher/local-path-provisioner/{{ local_path_version }}/deploy/local-path-storage.yaml
    # Каталог томов на узле — рядом с данными мониторинга, чтобы всё
    # состояние стенда лежало под одним путём.
    local_path_config_json: >-
      {{ {'nodePathMap': [{'node': 'DEFAULT_PATH_FOR_NON_LISTED_NODES', 'paths': [local_path_dir]}]} | to_json }}
    ss_system_placement:
      nodeSelector:
        node-role.kubernetes.io/ss-system: ""
      tolerations:
        - key: node-role.kubernetes.io/ss-system
          operator: Exists
          effect: NoSchedule
  module_defaults:
    group/kubernetes.core.k8s:
      kubeconfig: "{{ playbook_dir }}/../kubeconfig"
  tasks:
    - name: Забрать апстримный манифест
      ansible.builtin.uri:
        url: "{{ local_path_url }}"
        return_content: true
      register: local_path_manifest

    - name: Разобрать манифест на объекты
      ansible.builtin.set_fact:
        local_path_docs: "{{ local_path_manifest.content | from_yaml_all | select('truthy') | list }}"

    # Объекты применяются УЖЕ ИЗМЕНЁННЫМИ, а не «применить апстрим, потом
    # пропатчить»: патч поверх апстрима на каждом прогоне возвращал бы
    # дефолты и тут же перезаписывал их — вечный changed. Здесь прогон
    # идемпотентен.
    - name: Применить базовые объекты (namespace, RBAC) — без ConfigMap/Deployment/StorageClass
      kubernetes.core.k8s:
        state: present
        definition: >-
          {{ local_path_docs
             | rejectattr('kind', 'in', ['ConfigMap', 'Deployment', 'StorageClass'])
             | list }}

    - name: Применить ConfigMap с нашим каталогом томов
      kubernetes.core.k8s:
        state: present
        definition: >-
          {{ (local_path_docs | selectattr('kind', 'equalto', 'ConfigMap') | first)
             | combine({'data': {'config.json': local_path_config_json}}, recursive=True) }}

    - name: Применить Deployment, прибитый к ss-system (на bench провижинер не нужен)
      kubernetes.core.k8s:
        state: present
        definition: >-
          {{ (local_path_docs | selectattr('kind', 'equalto', 'Deployment') | first)
             | combine({'spec': {'template': {'spec': ss_system_placement}}}, recursive=True) }}

    # Апстримный StorageClass намеренно НЕ применяется (отфильтрован выше):
    # у него reclaimPolicy Delete, то есть удаление PVC или неймспейса унесло
    # бы результаты серий. Нужен Retain — но это поле НЕИЗМЕНЯЕМОЕ, поэтому
    # класс с чужой политикой (остался от прежней установки апстрима) нельзя
    # пропатчить, только пересоздать.
    - name: Прочитать текущий StorageClass local-path
      kubernetes.core.k8s_info:
        api_version: storage.k8s.io/v1
        kind: StorageClass
        name: local-path
      register: existing_sc

    - name: Убрать StorageClass с чужой reclaimPolicy (поле неизменяемо)
      kubernetes.core.k8s:
        state: absent
        api_version: storage.k8s.io/v1
        kind: StorageClass
        name: local-path
      when:
        - existing_sc.resources | length > 0
        - existing_sc.resources[0].reclaimPolicy | default('') != 'Retain'

    - name: StorageClass по умолчанию (Retain)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: local-path
            annotations:
              storageclass.kubernetes.io/is-default-class: "true"
          provisioner: rancher.io/local-path
          reclaimPolicy: Retain
          volumeBindingMode: WaitForFirstConsumer

    - name: Дождаться готовности провижинера
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        namespace: local-path-storage
        name: local-path-provisioner
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 180

    - name: Перечитать StorageClass'ы
      kubernetes.core.k8s_info:
        api_version: storage.k8s.io/v1
        kind: StorageClass
      register: storage_classes

    - name: Итог
      ansible.builtin.debug:
        msg: >-
          StorageClass: {{ storage_classes.resources | map(attribute='metadata.name') | list | join(', ') }};
          по умолчанию: {{ defaults | join(', ') if defaults | length > 0 else 'НЕТ (PVC без storageClassName зависнут)' }}
      vars:
        # Ключ аннотации содержит точки — путь вида metadata.annotations.<key>
        # Jinja разберёт как вложенность, поэтому проверяем наличие ключа
        # тестом contains по самому словарю annotations.
        defaults: >-
          {{ storage_classes.resources
             | map(attribute='metadata')
             | selectattr('annotations', 'defined')
             | selectattr('annotations', 'contains', 'storageclass.kubernetes.io/is-default-class')
             | map(attribute='name') | list }}
